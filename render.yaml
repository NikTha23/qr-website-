# Render Blueprint — deploy the FastAPI backend as a Web Service.
# Connect your GitHub repo in the Render dashboard, or use "Blueprint" with this file.
# Set environment variables in the dashboard (SECRET_KEY, DATABASE_URL, CORS_ORIGINS, etc.).

services:
  - type: web
    name: qr-studio-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: ENVIRONMENT
        value: production
      # Add in dashboard (do not commit real values):
      # SECRET_KEY, DATABASE_URL, PUBLIC_BASE_URL, CORS_ORIGINS, REDIS_URL (optional)
